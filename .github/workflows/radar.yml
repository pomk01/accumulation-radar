name: accumulation-radar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare env file
        run: |
          cat > .env.oi <<EOF
          TG_BOT_TOKEN=${TG_BOT_TOKEN}
          TG_CHAT_ID=${TG_CHAT_ID}
          EOF

      - name: Debug env file
        run: |
          echo ".env.oi exists: $(test -f .env.oi && echo yes || echo no)"
          echo "TG_BOT_TOKEN length: $(python - <<'PY'
from pathlib import Path
p=Path('.env.oi')
text=p.read_text() if p.exists() else ''
val=''
for line in text.splitlines():
    if line.startswith('TG_BOT_TOKEN='):
        val=line.split('=',1)[1]
print(len(val))
PY
)"
          echo "TG_CHAT_ID length: $(python - <<'PY'
from pathlib import Path
p=Path('.env.oi')
text=p.read_text() if p.exists() else ''
val=''
for line in text.splitlines():
    if line.startswith('TG_CHAT_ID='):
        val=line.split('=',1)[1]
print(len(val))
PY
)"

      - name: Run full scan
        run: python accumulation_radar.py full
