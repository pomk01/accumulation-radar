name: accumulation-radar

run-name: accumulation-radar

'on':
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare env file
        run: |
          {
            echo "TG_BOT_TOKEN=${TG_BOT_TOKEN}"
            echo "TG_CHAT_ID=${TG_CHAT_ID}"
          } > .env.oi

      - name: Debug env presence
        run: |
          test -s .env.oi
          python - <<'PY'
from pathlib import Path
text = Path('.env.oi').read_text()
vals = {}
for line in text.splitlines():
    if '=' in line:
        k, v = line.split('=', 1)
        vals[k] = v
print('env_file_exists', True)
print('token_present', bool(vals.get('TG_BOT_TOKEN')))
print('chat_present', bool(vals.get('TG_CHAT_ID')))
print('token_len', len(vals.get('TG_BOT_TOKEN', '')))
print('chat_len', len(vals.get('TG_CHAT_ID', '')))
PY

      - name: Run full scan
        run: python accumulation_radar.py full
